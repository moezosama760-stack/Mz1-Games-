<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mz1 Games</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
color:white;
background:linear-gradient(270deg,#000,#111,#000,#111);
background-size:800% 800%;
animation:bgMove 20s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

header{
text-align:center;
padding:30px 10px;
border-bottom:2px solid #00ff9c;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(4px);
}

header h1{
margin:0;
font-size:38px;
color:#00ff9c;
letter-spacing:1px;
}

header p{
margin:8px 0 0;
color:#bbb;
}

.games{
padding:40px 30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
max-width:1300px;
margin:auto;
}

.card{
background:#121212;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 18px rgba(0,0,0,0.8);
transition:transform .25s ease, box-shadow .25s ease;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-6px) scale(1.03);
box-shadow:0 0 22px #00ff9c55;
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.card h3{
margin:10px;
font-size:18px;
min-height:44px;
}

.price{
margin:0 10px 10px;
color:#00ff9c;
font-weight:bold;
font-size:20px;
}

.buy{
margin:0 10px 14px;
padding:10px;
text-align:center;
background:#25D366;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:bold;
transition:background .2s;
}

.buy:hover{
background:#1ebe5d;
}

footer{
text-align:center;
padding:20px;
color:#888;
font-size:14px;
}

</style>
</head>

<body>

<header>
<h1>Mz1 Games</h1>
<p>PlayStation Games
